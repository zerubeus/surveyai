services:
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - WORKER_ID=worker-docker-1
      - POLL_INTERVAL=2
      - SUPABASE_URL
      - SUPABASE_SERVICE_ROLE_KEY
      - GEMINI_API_KEY
      - GEMINI_MODEL
      - APP_URL
    restart: unless-stopped
